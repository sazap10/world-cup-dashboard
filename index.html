<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0c1322" />
    <script>
      // Apply the saved (or system) theme before first paint to avoid a flash.
      (function () {
        try {
          var pref = localStorage.getItem('wc26.theme') || 'system';
          var dark =
            pref === 'dark' ||
            (pref !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute('content', dark ? '#0c1322' : '#eef1f6');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <meta
      name="description"
      content="World Cup 2026 dashboard: upcoming games in your timezone, live scores, results, group tables, the knockout bracket, and where to watch every game in the UK."
    />
    <title>World Cup 2026 · Dashboard</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
